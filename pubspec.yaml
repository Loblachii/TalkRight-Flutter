name: capstone_project
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.7.2

dependencies:
  flutter:
    sdk: flutter
  speech_to_text: ^7.3.0
  flutter_tts: ^4.2.3
  shared_preferences: ^2.2.2
  audioplayers: ^6.1.0
  cupertino_icons: ^1.0.8
  qr_flutter: ^4.1.0
  flutter_local_notifications: ^17.2.4
  timezone: ^0.9.4
  rename: ^3.1.0

dev_dependencies:
  flutter_launcher_icons: ^0.14.3
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/images/talkRightLogo.png"

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/sounds/

  fonts:
    - family: Fredoka
      fonts:
        - asset: assets/fonts/Fredoka-Bold.ttf
          weight: 700
        - asset: assets/fonts/Fredoka-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Fredoka-Medium.ttf
          weight: 500
        - asset: assets/fonts/Fredoka-Regular.ttf
          weight: 400
        - asset: assets/fonts/Fredoka-Light.ttf
          weight: 300

    - family: PatrickHandSC
      fonts:
        - asset: assets/fonts/PatrickHandSC-Regular.ttf
          weight: 400